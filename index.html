<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TrustPulse — Brand Trust Scanner</title>
<script>const API_BASE='https://web-production-63792.up.railway.app';</script>
</head>
<body style="font-family:sans-serif;margin:0;padding:2rem;background:#f7f7f5">
<h1 style="color:#1D9E75">🛡️ TrustPulse</h1>
<p>AI-powered brand trust scanner</p>
<div style="margin:2rem 0">
<input id="url" type="text" value="https://amazon.co.uk" style="padding:10px;width:70%;border:1px solid #ccc;border-radius:8px;font-size:14px" />
<button onclick="scan()" style="padding:10px 20px;background:#1D9E75;color:#fff;border:none;border-radius:8px;margin-left:8px;cursor:pointer;font-size:14px">Scan</button>
</div>
<div id="result"></div>
<script>
async function scan(){
  const url=document.getElementById('url').value;
  document.getElementById('result').innerHTML='<p>Scanning...</p>';
  try{
    const r=await fetch(API_BASE+'/api/scan/',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url})});
    const d=await r.json();
    document.getElementById('result').innerHTML=`
      <h2>Trust Score: <span style="color:#1D9E75">${d.score}/100</span></h2>
      <h3>${d.grade}</h3>
      <p>${d.grade_desc}</p>
      <h3>Issues Found: ${d.issues_count}</h3>
      ${d.issues.map(i=>`<div style="padding:10px;margin:8px 0;background:#fff;border-radius:8px;border-left:4px solid ${i.severity==='high'?'#E24B4A':'#EF9F27'}">
        <b>${i.title}</b><br/><small>${i.detail}</small>
      </div>`).join('')}
    `;
  }catch(e){
    document.getElementById('result').innerHTML='<p style="color:red">Scan failed. Check your Railway backend is running.</p>';
  }
}
</script>
</body>
</html>
